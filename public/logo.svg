<svg xmlns="http://www.w3.org/2000/svg" width="200" height="140" viewBox="210 40 220 140" role="img">
  <title>FlashAI logo</title>
  <desc>Three stacked flashcards with FlashAI text</desc>

  <style>
    .logo-text { fill: #f1f5f9; }
    @media (prefers-color-scheme: light) {
    .logo-text { fill: #0f172a; }
    }
  </style>

  <rect x="248" y="48" width="124" height="88" rx="8" fill="#1e293b" stroke="rgba(255,255,255,0.1)" stroke-width="0.5" opacity="0.4" transform="rotate(-8, 310, 92)"/>
  <rect x="248" y="48" width="124" height="88" rx="8" fill="#1e293b" stroke="rgba(255,255,255,0.1)" stroke-width="0.5" opacity="0.65" transform="rotate(-3, 310, 92)"/>
  <rect x="248" y="48" width="124" height="88" rx="8" fill="#1e293b" stroke="rgba(255,255,255,0.25)" stroke-width="0.5"/>
  <line x1="248" y1="68" x2="372" y2="68" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <rect x="258" y="55" width="50" height="5" rx="2" fill="#94a3b8" opacity="0.5"/>
  <rect x="314" y="55" width="24" height="5" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="258" y="77" width="88" height="4" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="258" y="87" width="72" height="4" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="258" y="97" width="80" height="4" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="258" y="107" width="60" height="4" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="258" y="117" width="76" height="4" rx="2" fill="#94a3b8" opacity="0.3"/>
  <text x="340" y="172" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="500" font-size="28" class="logo-text">Flash<tspan fill="#4f8ef7">AI</tspan></text>
</svg>